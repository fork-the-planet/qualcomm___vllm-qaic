<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 520 120" width="520" height="120">
  <!-- Background -->
  <rect width="520" height="120" fill="white" rx="10"/>

  <!-- vLLM text (teal/green, vLLM brand color) -->
  <text x="20" y="82" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="72" fill="#1a9e8a" letter-spacing="-2">vLLM</text>

  <!-- × symbol -->
  <text x="218" y="82" font-family="Arial, sans-serif" font-weight="300" font-size="56" fill="#444444">×</text>

  <!-- Cloud AI 100 chip icon (simplified representation) -->
  <!-- Chip body -->
  <rect x="295" y="18" width="84" height="84" rx="8" fill="#3d4de8" stroke="#1a2ab0" stroke-width="2"/>
  <!-- Inner core grid (4x4) -->
  <rect x="307" y="30" width="14" height="14" rx="2" fill="#6b7bff"/>
  <rect x="325" y="30" width="14" height="14" rx="2" fill="#6b7bff"/>
  <rect x="343" y="30" width="14" height="14" rx="2" fill="#6b7bff"/>
  <rect x="361" y="30" width="14" height="14" rx="2" fill="#6b7bff"/>
  <rect x="307" y="48" width="14" height="14" rx="2" fill="#6b7bff"/>
  <rect x="325" y="48" width="14" height="14" rx="2" fill="#8aff8a"/>
  <rect x="343" y="48" width="14" height="14" rx="2" fill="#8aff8a"/>
  <rect x="361" y="48" width="14" height="14" rx="2" fill="#6b7bff"/>
  <rect x="307" y="66" width="14" height="14" rx="2" fill="#6b7bff"/>
  <rect x="325" y="66" width="14" height="14" rx="2" fill="#8aff8a"/>
  <rect x="343" y="66" width="14" height="14" rx="2" fill="#8aff8a"/>
  <rect x="361" y="66" width="14" height="14" rx="2" fill="#6b7bff"/>
  <rect x="307" y="84" width="14" height="14" rx="2" fill="#6b7bff"/>
  <rect x="325" y="84" width="14" height="14" rx="2" fill="#6b7bff"/>
  <rect x="343" y="84" width="14" height="14" rx="2" fill="#6b7bff"/>
  <rect x="361" y="84" width="14" height="14" rx="2" fill="#6b7bff"/>
  <!-- Chip pins top/bottom -->
  <line x1="313" y1="18" x2="313" y2="10" stroke="#aaa" stroke-width="2"/>
  <line x1="327" y1="18" x2="327" y2="10" stroke="#aaa" stroke-width="2"/>
  <line x1="341" y1="18" x2="341" y2="10" stroke="#aaa" stroke-width="2"/>
  <line x1="355" y1="18" x2="355" y2="10" stroke="#aaa" stroke-width="2"/>
  <line x1="369" y1="18" x2="369" y2="10" stroke="#aaa" stroke-width="2"/>
  <line x1="313" y1="102" x2="313" y2="110" stroke="#aaa" stroke-width="2"/>
  <line x1="327" y1="102" x2="327" y2="110" stroke="#aaa" stroke-width="2"/>
  <line x1="341" y1="102" x2="341" y2="110" stroke="#aaa" stroke-width="2"/>
  <line x1="355" y1="102" x2="355" y2="110" stroke="#aaa" stroke-width="2"/>
  <line x1="369" y1="102" x2="369" y2="110" stroke="#aaa" stroke-width="2"/>
  <!-- Chip pins left/right -->
  <line x1="295" y1="34" x2="287" y2="34" stroke="#aaa" stroke-width="2"/>
  <line x1="295" y1="50" x2="287" y2="50" stroke="#aaa" stroke-width="2"/>
  <line x1="295" y1="66" x2="287" y2="66" stroke="#aaa" stroke-width="2"/>
  <line x1="295" y1="82" x2="287" y2="82" stroke="#aaa" stroke-width="2"/>
  <line x1="379" y1="34" x2="387" y2="34" stroke="#aaa" stroke-width="2"/>
  <line x1="379" y1="50" x2="387" y2="50" stroke="#aaa" stroke-width="2"/>
  <line x1="379" y1="66" x2="387" y2="66" stroke="#aaa" stroke-width="2"/>
  <line x1="379" y1="82" x2="387" y2="82" stroke="#aaa" stroke-width="2"/>

  <!-- "Cloud AI 100" text below chip -->
  <text x="337" y="118" font-family="Arial, sans-serif" font-size="11" fill="#3d4de8" text-anchor="middle" font-weight="bold">Cloud AI 100</text>
